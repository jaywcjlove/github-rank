name: Build & Deploy
on:
  push:
    tags:
      - 'v*'  # 监听所有以 v 开头的标签
  schedule:
    # 每天 5:30 和 17:30 UTC 触发工作流程
    #- cron:  '30 5 * * *'
    # 每月的第 15 天凌晨 3 点执行
    #- cron: "0 3 15 * *"
    # 每隔 7 天执行
    - cron: "0 0 */7 * *"

jobs:
  build-deploy:
    env: 
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm install

      - name: Modify Version(Date)
        shell: bash
        run: |
          node -e 'var pkg = require("./package.json"); pkg.version= (new Date().getFullYear().toString().substr(2)) + "." + (new Date().getMonth() + 1) + "." + (new Date().getDate()); require("fs").writeFileSync("./package.json", JSON.stringify(pkg, null, 2))'

      - name: Validate GitHub Token & Rate Limit
        shell: bash
        run: |
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ACCESS_TOKEN is empty or not configured in repository secrets."
            exit 1
          fi

          USER_STATUS=$(curl -sS -o /tmp/gh_user.json -w "%{http_code}" \
            -H "Authorization: token $ACCESS_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user)

          echo "GitHub /user status: $USER_STATUS"
          if [ "$USER_STATUS" != "200" ]; then
            echo "Token validation failed. API response:"
            cat /tmp/gh_user.json
            exit 1
          fi

          RATE_STATUS=$(curl -sS -o /tmp/gh_rate.json -w "%{http_code}" \
            -H "Authorization: token $ACCESS_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/rate_limit)

          echo "GitHub /rate_limit status: $RATE_STATUS"
          node -e 'const fs=require("fs");const data=JSON.parse(fs.readFileSync("/tmp/gh_user.json","utf8"));console.log(`Authenticated as: ${data.login || "unknown"}`);'
          node -e 'const fs=require("fs");const data=JSON.parse(fs.readFileSync("/tmp/gh_rate.json","utf8"));const core=data.resources?.core||{};const search=data.resources?.search||{};console.log(`core remaining: ${core.remaining}/${core.limit}, reset: ${core.reset}`);console.log(`search remaining: ${search.remaining}/${search.limit}, reset: ${search.reset}`);'

      - run: npm run get:trending
      - run: npm run get:repos
      - run: npm run get:users
      - run: npm run get:users:china
      - run: cat .cache/users.json
      - run: cat .cache/users.china.json
      - run: npm run get:users:info

      - run: npm run start
      - run: mkdir -p web/data
      - run: cp -rf dist/* web/data

      - name: Generate Contributors Images
        uses: jaywcjlove/github-action-contributors@main
        with:
          filter-author: (renovate\[bot\]|renovate-bot|dependabot\[bot\])
          output: web/CONTRIBUTORS.svg
          avatarSize: 42

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

      - name: Modify README.md
        uses: jaywcjlove/github-action-modify-file-content@main
        with:
          path: README.md
          body: "{{date:YYYY-MM-DD HH:mm:ss}}"
          branch: master
      
      # node@v24.0.0+ 
      # https://gist.github.com/jaywcjlove/a178278521a6f72c74525d3f1d9c4bf9
      - run: NODE_AUTH_TOKEN="" npm publish --access public --provenance
        continue-on-error: true
